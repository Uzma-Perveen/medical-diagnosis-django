<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediAI – {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .sidebar { background: #0d6efd; min-height: 100vh; color: white; }
    .sidebar a { color: rgba(255,255,255,0.85); text-decoration: none; display: block; padding: 10px 20px; border-radius: 8px; margin: 4px 0; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.2); color: white; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .badge-confidence { font-size: 1rem; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    {% if user.is_authenticated %}
    <div class="col-md-2 sidebar py-4 px-3">
      <h5 class="mb-4 fw-bold"><i class="fas fa-heartbeat me-2"></i>MediAI</h5>
      <a href="{% url 'dashboard' %}"><i class="fas fa-home me-2"></i>Dashboard</a>
      <a href="{% url 'symptom_input' %}"><i class="fas fa-stethoscope me-2"></i>New Diagnosis</a>
      <a href="{% url 'history' %}"><i class="fas fa-history me-2"></i>History</a>
      <hr style="border-color:rgba(255,255,255,0.3)">
      <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
    </div>
    <div class="col-md-10 py-4 px-4">
      {% if messages %}
        {% for m in messages %}
          <div class="alert alert-{{ m.tags }} alert-dismissible fade show">{{ m }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </div>
    {% else %}
    <div class="col-12">{% block auth_content %}{% endblock %}</div>
    {% endif %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
