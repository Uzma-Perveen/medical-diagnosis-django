{% extends 'diagnosis/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#0d6efd,#6610f2)">
  <div class="card p-4" style="width:500px;max-height:90vh;overflow-y:auto">
    <h3 class="text-center text-primary mb-4">Create Account</h3>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
        </div>
      {% endfor %}
      <button class="btn btn-primary w-100">Register</button>
      <p class="text-center mt-3">Have an account? <a href="{% url 'login' %}">Login</a></p>
    </form>
  </div>
</div>
{% endblock %}
