{% extends 'diagnosis/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#0d6efd,#6610f2)">
  <div class="card p-4" style="width:400px">
    <h3 class="text-center text-primary mb-4"><i class="fas fa-heartbeat me-2"></i>MediAI Login</h3>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" required>
      </div>
      <button class="btn btn-primary w-100">Login</button>
      <p class="text-center mt-3">No account? <a href="{% url 'register' %}">Register</a></p>
    </form>
  </div>
</div>
{% endblock %}
